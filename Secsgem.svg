<svg width="1280" height="720" viewBox="-130 -40 960 540" xmlns="http://www.w3.org/2000/svg">
  <rect x="-500" y="-500" width="2000" height="2000" fill="#050a14"/>

  <g transform="translate(150, 40)">
    <rect width="400" height="80" rx="10" fill="#0f1f3d" stroke="#1e3a6e" stroke-width="2"/>
    <text x="200" y="48" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Hệ thống Host (MES/EAP)</text>
    <circle cx="20" cy="15" r="5" fill="#4d7eff"/>
    <circle cx="380" cy="15" r="5" fill="#4d7eff"/>
  </g>

  <g transform="translate(300, 120)">
    <rect x="-12" y="0" width="24" height="180" rx="5" fill="#00ffff" opacity="0.2"/>
    <path d="M 0 0 L 0 180" stroke="#00ffff" stroke-width="6" stroke-dasharray="12 6">
      <animate attributeName="stroke-dashoffset" from="0" to="180" dur="0.8s" repeatCount="indefinite" />
    </path>
    <text x="-18" y="90" font-family="Arial" font-size="14" font-weight="bold" fill="#00ffff" text-anchor="middle" transform="rotate(-90 -18 90)">HSMS (High Speed)</text>
  </g>

  <g transform="translate(410, 120)">
    <rect x="-35" y="0" width="70" height="22" rx="4" fill="#3b82f6"/>
    <rect x="-35" y="35" width="70" height="22" rx="4" fill="#3b82f6"/>
    <rect x="-35" y="70" width="70" height="22" rx="4" fill="#3b82f6"/>
    <rect x="-35" y="105" width="70" height="22" rx="4" fill="#3b82f6"/>
    <rect x="-35" y="140" width="70" height="22" rx="4" fill="#3b82f6"/>
    <rect x="-35" y="175" width="70" height="22" rx="4" fill="#3b82f6"/>
    <text x="55" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="#60a5fa" text-anchor="middle" transform="rotate(-90 55 100)">SECS-II Messages</text>
  </g>

  <g transform="translate(150, 310)">
    <rect width="400" height="110" rx="10" fill="#141a26" stroke="#2a3c5c" stroke-width="2"/>
    <text x="200" y="345" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Thiết bị (Equipment)</text>
    <circle cx="100" cy="65" r="25" fill="#2a3c5c" opacity="0.5"/>
    <circle cx="300" cy="65" r="25" fill="#2a3c5c" opacity="0.5"/>
  </g>

  <circle cx="350" cy="310" r="35" fill="#ffdf4d" opacity="0.4">
    <animate attributeName="r" from="30" to="40" dur="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.3" to="0.6" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
