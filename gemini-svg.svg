<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#050a14"/>

  <g transform="translate(0, 0)">
    <g transform="translate(440, 180)">
      <rect width="400" height="80" rx="10" fill="#0f1f3d" stroke="#1e3a6e" stroke-width="2"/>
      <text x="200" y="45" font-family="Arial" font-size="20" fill="white" text-anchor="middle">Hệ thống Host (MES/EAP)</text>
      <circle cx="20" cy="15" r="5" fill="#4d7eff"/>
      <circle cx="380" cy="15" r="5" fill="#4d7eff"/>
    </g>

    <g transform="translate(440, 440)">
      <rect width="400" height="100" rx="10" fill="#141a26" stroke="#2a3c5c" stroke-width="2"/>
      <text x="200" y="315" font-family="Arial" font-size="20" fill="white" text-anchor="middle">Thiết bị (Equipment/Wafers)</text>
      <path d="M 50 20 L 80 80 L 110 20 Z" fill="#2a3c5c"/> 
      <path d="M 290 20 L 320 80 L 350 20 Z" fill="#2a3c5c"/>
    </g>

    <g transform="translate(590, 260)">
      <rect x="-10" y="0" width="20" height="180" rx="5" fill="#00ffff" opacity="0.3"/>
      <path d="M 0 0 L 0 180" stroke="#00ffff" stroke-width="4" stroke-dasharray="10 5">
        <animate attributeName="stroke-dashoffset" from="0" to="150" dur="1s" repeatCount="indefinite" />
      </path>
      <text x="0" y="90" font-family="Arial" font-size="12" fill="#00ffff" text-anchor="middle" transform="rotate(-90 0 90)">-> HSMS (Tốc độ cao) -></text>
    </g>

    <g transform="translate(690, 260)">
      <rect x="-30" y="0" width="60" height="20" rx="3" fill="#3b82f6"/>
      <rect x="-30" y="30" width="60" height="20" rx="3" fill="#3b82f6"/>
      <rect x="-30" y="60" width="60" height="20" rx="3" fill="#3b82f6"/>
      <rect x="-30" y="90" width="60" height="20" rx="3" fill="#3b82f6"/>
      <rect x="-30" y="120" width="60" height="20" rx="3" fill="#3b82f6"/>
      <rect x="-30" y="150" width="60" height="20" rx="3" fill="#3b82f6"/>
      <text x="0" y="90" font-family="Arial" font-size="12" fill="white" text-anchor="middle" transform="rotate(-90 0 90)">-> SECS-II (Phân tầng) -></text>
    </g>

    <circle cx="640" cy="440" r="30" fill="#ffdf4d" opacity="0.5">
      <animate attributeName="r" from="25" to="35" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
